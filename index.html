    async function initPushNotifications() {
        if (!messaging) {
            console.log("FCM no disponible, omitiendo push");
            return;
        }
        if (!('Notification' in window) || !('serviceWorker' in navigator)) {
            console.log('Push no soportado por navegador');
            return;
        }
        try {
            let permission = Notification.permission;
            if (permission !== 'granted') {
                permission = await Notification.requestPermission();
            }
            if (permission !== 'granted') {
                console.log("Permiso de notificaciones denegado");
                return;
            }
            
            let registration;
            try {
                registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                console.log('Service Worker registrado');
            } catch(swErr) {
                console.warn("No se pudo registrar el Service Worker. Asegúrate de que firebase-messaging-sw.js existe en la raíz.", swErr);
                return;
            }
            
            const token = await messaging.getToken({
                vapidKey: 'BHDriFbrIHZxLK67Lpenkcxh1q7ttlzslLt2TeF_Q24smLsts65wwAyYYF9FXs4fzG2jK4YgPpjHsRfF6YPMXYw',
                serviceWorkerRegistration: registration
            });
            if (token) {
                await db.ref(`push_tokens/${currentUser}`).set({
                    token: token,
                    lastActive: Date.now()
                });
                console.log('✅ Push activado correctamente. Token:', token);
            }
        } catch (error) {
            console.error('Error en initPushNotifications (no bloquea):', error);
        }
    }

            </div>
        </div>`;

    function buildCommentHtml(taskId, comment, commentId) {
        let repliesHtml = '';
        const replies = comment.replies ? Object.entries(comment.replies) : [];
        replies.sort((a,b)=>a[1].ts - b[1].ts);
        replies.forEach(([rid, r]) => repliesHtml += createReplyHtml(r, rid, taskId, commentId));
        const canDelete = (comment.u === currentUser || isAdmin);
        let commentImg = '';
        if(comment.img) commentImg = `<img src="${comment.img}" class="comment-img" onclick="openImageViewer('${comment.img}')">`;
        return `<div class="comment-item" data-comment-id="${commentId}">
            <div style="flex:1;">
                <div style="font-size:11px; color:var(--truper-light); font-weight:600;">${escapeHtml(comment.u)} • ${comment.t}</div>
                <div style="font-size:13px; margin-top:4px;">${escapeHtml(comment.v||'')}</div>${commentImg}
                ${repliesHtml}
                <div><button class="reply-btn" onclick="showReplyForm('${taskId}','${commentId}', this.closest('.comment-item'))">💬 Responder</button></div>
            </div>
            ${canDelete ? `<button class="delete-comment" onclick="deleteComment('${taskId}','${commentId}')">🗑️</button>` : ''}
        </div>`;
    }

    async function renderFeed(){ if(!feedDiv) return; const sc=document.getElementById('main-container'), prev=sc?sc.scrollTop:0; feedDiv.innerHTML=""; const filt=Object.entries(tasksDB).filter(([_,t])=>t.a===currentArea); if(filt.length===0){ feedDiv.innerHTML=`<div class="glass-card" style="padding:40px; text-align:center;">Sin reportes en ${currentArea}</div>`; return; } filt.sort((a,b)=>b[1].ts-a[1].ts); const online=await getOnlineUsers(); for(const [tid,t] of filt) feedDiv.appendChild(createTaskCard(tid,t,online)); if(sc) sc.scrollTop=prev; }
    async function getOnlineUsers(){ const snap=await db.ref('presence').once('value'); const set=new Set(); const now=Date.now(); snap.forEach(c=>{ const d=c.val(); if(d && d.online===true && (now-d.lastSeen)<60000) set.add(c.key); }); return set; }
    function updateAreaNavCounters(){ const pills=document.querySelectorAll('#area-tabs .nav-pill'), cnts={}; for(const tid in tasksDB) cnts[tasksDB[tid].a]=(cnts[tasksDB[tid].a]||0)+1; pills.forEach(p=>{ const an=p.innerText.split('(')[0].trim(); p.innerHTML=`${an} <span style="font-size:11px;">(${cnts[an]||0})</span>`; }); }
    function buildAreaNav(){ const c=document.getElementById('area-tabs'); c.innerHTML=""; DEPARTMENTS.forEach(area=>{ const p=document.createElement('div'); p.className=`nav-pill ${area===currentArea?'active':''}`; const cnt=Object.values(tasksDB).filter(t=>t.a===area).length; p.innerHTML=`${area} <span style="font-size:11px;">(${cnt})</span>`; p.onclick=()=>{ currentArea=area; buildAreaNav(); renderFeed(); updateAreaChartAndCounter(); }; c.appendChild(p); }); setTimeout(()=>{ const act=c.querySelector('.active'); if(act) act.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },50); }
    async function updateAreaChartAndCounter(){ const areaT=Object.values(tasksDB).filter(t=>t.a===currentArea); const total=areaT.length, comp=areaT.filter(t=>t.st==='Finalizado').length, pct=total===0?0:Math.round((comp/total)*100); document.getElementById('task-counter').innerHTML=`${comp} de ${total}`; document.getElementById('chart-percent-text').innerText=pct+"%"; const ctx=document.getElementById('areaChartCanvas').getContext('2d'); const grad=ctx.createLinearGradient(0,0,100,100); if(pct===100) grad.addColorStop(0,'#1B5E20'),grad.addColorStop(1,'#66BB6A'); else if(pct>=70) grad.addColorStop(0,'#E07000'),grad.addColorStop(0.7,'#F09C3E'),grad.addColorStop(1,'#4CAF50'); else grad.addColorStop(0,'#B85C00'),grad.addColorStop(1,'#E07000'); if(chartInstance){ chartInstance.data.datasets[0].data=[pct,100-pct]; chartInstance.data.datasets[0].backgroundColor=[grad,'rgba(255,255,255,0.04)']; chartInstance.update(); }else{ chartInstance=new Chart(ctx,{ type:'doughnut', data:{datasets:[{data:[pct,100-pct],backgroundColor:[grad,'rgba(255,255,255,0.04)'],borderWidth:0,cutout:'80%'}]}, options:{plugins:{tooltip:{enabled:false},legend:{display:false}} } }); } }
    function setupRealtimeSync(){ db.ref('tasks').on('child_added',(s)=>{ const t=s.val(); if(!t) return; tasksDB[s.key]=t; if(t.a===currentArea) renderFeed(); updateAreaChartAndCounter(); updateAreaNavCounters(); }); db.ref('tasks').on('child_changed',(s)=>{ const t=s.val(); if(!t) return; tasksDB[s.key]=t; if(t.a===currentArea){ const old=document.getElementById(`task-${s.key}`); if(old){ const nue=createTaskCard(s.key,t,null); old.parentNode.replaceChild(nue,old); } } updateAreaChartAndCounter(); updateAreaNavCounters(); }); db.ref('tasks').on('child_removed',(s)=>{ delete tasksDB[s.key]; const card=document.getElementById(`task-${s.key}`); if(card) card.remove(); updateAreaChartAndCounter(); updateAreaNavCounters(); }); }
    window.updateTaskStatus=function(tid,ns){ const t=tasksDB[tid]; if(t&&t.st!==ns){ const log=t.history?[...t.history]:[]; log.push({u:currentUser,st:ns,t:new Date().toLocaleTimeString(),ts:Date.now()}); db.ref(`tasks/${tid}`).update({st:ns,history:log}); if(t.u!==currentUser) addNotification({title:"Estado",message:`${currentUser} cambió estado a "${ns}"`}); renderFeed(); } };
    window.toggleReaction=function(tid,type){ const t=tasksDB[tid]; if(!t) return; const isLike=type==='ups'; const ref=db.ref(`tasks/${tid}/${type}/${currentUser}`); const oppRef=db.ref(`tasks/${tid}/${isLike?'downs':'ups'}/${currentUser}`); if(t[type]&&t[type][currentUser]){ ref.remove(); playDislikeSound(); }else{ ref.set(true); oppRef.remove(); playLikeSound(); if(t.u!==currentUser) addNotification({title:isLike?"Me gusta":"No me gusta",message:`${currentUser} ${isLike?'👍 le gusta':'👎 no le gusta'} tu publicación`}); } renderFeed(); };
    window.deleteComment=function(tid,cid){ deleteCommentTarget={taskId:tid,commentId:cid}; document.getElementById('delete-comment-modal').style.display='flex'; };
    window.closeDeleteCommentModal=function(){ document.getElementById('delete-comment-modal').style.display='none'; deleteCommentTarget={}; };
    window.confirmDeleteComment=function(){ if(deleteCommentTarget.taskId && deleteCommentTarget.commentId){ db.ref(`tasks/${deleteCommentTarget.taskId}/comments/${deleteCommentTarget.commentId}`).remove().then(()=>renderFeed()); } closeDeleteCommentModal(); };
    document.getElementById('confirm-delete-comment-btn').onclick=()=>window.confirmDeleteComment();
    window.openDeleteModal=function(id){ deleteTargetId=id; document.getElementById('delete-modal').style.display='flex'; };
    window.closeDeleteModal=function(){ document.getElementById('delete-modal').style.display='none'; deleteTargetId=null; };
    document.getElementById('confirm-delete-btn').onclick=()=>{ if(deleteTargetId) db.ref(`tasks/${deleteTargetId}`).remove(); closeDeleteModal(); };
    window.toggleComments=function(id){ document.getElementById(id)?.classList.toggle('open'); };
    window.showTaskHistory=function(tid){ const t=tasksDB[tid]; if(!t||!t.history) return; const modal=document.getElementById('history-modal'), cont=document.getElementById('history-modal-content'); cont.innerHTML=''; (t.history||[]).sort((a,b)=>(a.ts||0)-(b.ts||0)).forEach(h=>{ const d=document.createElement('div'); d.style.padding='10px'; d.style.borderBottom='1px solid rgba(255,255,255,0.05)'; d.innerHTML=`<span style="color:var(--truper-light);">${escapeHtml(h.st)}</span> - ${escapeHtml(h.u)} <span style="float:right;">${escapeHtml(h.t)}</span>`; cont.appendChild(d); }); modal.style.display='flex'; };
    window.closeHistoryModal=()=>document.getElementById('history-modal').style.display='none';
    window.openImageViewer=function(src){ const v=document.getElementById('imageViewer'), i=document.getElementById('viewerImage'); i.src=src; i.classList.remove('zoomed'); v.style.display='flex'; const downloadBtn = document.getElementById('downloadImageBtn'); downloadBtn.onclick = () => { const link = document.createElement('a'); link.href = src; link.download = 'imagen.png'; link.click(); }; v.onclick=(e)=>{ if(e.target===v) closeImageViewer(); }; i.onclick=(e)=>{ e.stopPropagation(); i.classList.toggle('zoomed'); }; };
    window.closeImageViewer=function(){ document.getElementById('imageViewer').style.display='none'; };
    window.openFileInNewTab=function(url,name){ const a=document.createElement('a'); a.href=url; a.download=name; a.target='_blank'; a.click(); };
    function publishTask(){ const txt=document.getElementById('new-task-text').value.trim(); if(!txt && selectedFiles.length===0){ showToast("Escribe algo o adjunta archivo",true); return; } const newId=db.ref('tasks').push().key; const media=selectedFiles.map(f=>({dataURL:f.dataURL,type:f.type,name:f.name})); const hist=[{u:currentUser,st:'Iniciado',t:new Date().toLocaleTimeString(),ts:Date.now()}]; db.ref(`tasks/${newId}`).set({u:currentUser,r:currentRole,a:currentArea,txt:txt,mediaFiles:media,st:'Iniciado',ts:Date.now(),history:hist,ups:{},downs:{},comments:{}}).then(()=>{ document.getElementById('new-task-text').value=""; resetMediaSelection(); showToast("Publicado",false); playPublishSound(); }); }
    
    // ==================== LOGIN CON MANEJO DE ERRORES ====================
    let selectedRole = DEPARTMENTS[0];
    function buildRoleSelector(){ const c=document.getElementById('reg-role-selector'); c.innerHTML=''; DEPARTMENTS.forEach(r=>{ const d=document.createElement('div'); d.className='role-option'; d.innerText=r; d.onclick=()=>{ document.querySelectorAll('.role-option').forEach(o=>o.classList.remove('selected')); d.classList.add('selected'); selectedRole=r; }; c.appendChild(d); }); if(c.firstChild) c.firstChild.classList.add('selected'); }
    function switchAuthTab(tab){ document.getElementById('tab-login').classList.toggle('active',tab==='login'); document.getElementById('tab-register').classList.toggle('active',tab==='register'); document.getElementById('login-form').classList.toggle('active',tab==='login'); document.getElementById('register-form').classList.toggle('active',tab==='register'); }
    window.togglePasswordVisibility=function(i,b){ const inp=document.getElementById(i); if(inp.type==='password'){ inp.type='text'; b.textContent='🙈'; }else{ inp.type='password'; b.textContent='👁️'; } };
    async function registerUser(){ const u=document.getElementById('reg-username').value.trim().toUpperCase(), p=document.getElementById('reg-password').value.trim(); if(!u||!p){ showToast("Complete campos",true); return; } if(u.length<3){ showToast("Usuario mínimo 3 caracteres",true); return; } if(p.length<4){ showToast("Contraseña mínimo 4",true); return; } const ex=await db.ref(`users/${u}`).once('value'); if(ex.exists()){ showToast("Usuario ya existe",true); return; } await db.ref(`users/${u}`).set({password:p,role:selectedRole,created:Date.now()}); showToast(`✅ Usuario ${u} registrado`,false); document.getElementById('reg-username').value=''; document.getElementById('reg-password').value=''; switchAuthTab('login'); document.getElementById('login-username').value=u; document.getElementById('login-password').focus(); }
    async function loginUser(){ const u=document.getElementById('login-username').value.trim().toUpperCase(), p=document.getElementById('login-password').value.trim(); if(!u||!p){ showToast("Ingrese usuario y contraseña",true); return; } 
        try {
            if(u==='ADMIN' && p==='admin123'){ 
                const ar=db.ref(`users/ADMIN`); if(!(await ar.once('value')).exists()) await ar.set({password:'admin123',role:'ADMINISTRADOR',created:Date.now()}); 
                currentUser='ADMIN'; currentRole='ADMINISTRADOR'; currentArea='GERENTE'; isAdmin=true; saveUserName('ADMIN'); document.getElementById('admin-panel-container').style.display='flex'; playPatternSuccess(); completeLogin(); return; 
            }
            if(u==='BACKUP' && p==='backup123'){ 
                const br=db.ref(`users/BACKUP`); if(!(await br.once('value')).exists()) await br.set({password:'backup123',role:'BACKUP',created:Date.now()}); 
                currentUser='BACKUP'; currentRole='BACKUP'; currentArea='GERENTE'; isAdmin=false; saveUserName('BACKUP'); document.getElementById('admin-panel-container').style.display='none'; playPatternSuccess(); completeLogin(); return; 
            }
            const snap=await db.ref(`users/${u}`).once('value'); if(!snap.exists()){ showToast("Usuario no registrado",true); return; } const d=snap.val(); if(d.password===p){ currentUser=u; currentRole=d.role||"GERENTE"; currentArea=currentRole==='ADMINISTRADOR'?'GERENTE':currentRole; isAdmin=(currentRole==='ADMINISTRADOR'); saveUserName(u); document.getElementById('admin-panel-container').style.display=isAdmin?'flex':'none'; playPatternSuccess(); completeLogin(); }else{ showToast("Contraseña incorrecta",true); }
        } catch(err) { console.error("Error en login:", err); showToast("Error de conexión", true); }
    }
    function completeLogin(){ const lc=document.getElementById('login-card'); lc.classList.add('zoom-out-effect'); setTimeout(()=>{ loginScreen.style.display='none'; mainContainer.style.display='block'; lc.classList.remove('zoom-out-effect'); document.getElementById('header-subtitle').innerHTML=`${currentUser} • ${currentRole}`; loadNotifications(); initPushNotifications().catch(e=>console.warn("Push no iniciado:", e)); setupRealtimeSync(); db.ref('tasks').once('value',async(s)=>{ tasksDB=s.val()||{}; await renderFeed(); updateAreaChartAndCounter(); buildAreaNav(); }); resetInactivityTimer(); initPresence(); document.addEventListener('click',closePopupOnClickOutside); document.getElementById('bell-icon').onclick=e=>{ e.stopPropagation(); toggleNotificationPopup(); }; },200); }
    async function initPresence(){ if(!currentUser) return; presenceRef=db.ref(`presence/${currentUser}`); presenceRef.onDisconnect().set({online:false,lastSeen:Date.now()}); await presenceRef.set({online:true,lastSeen:Date.now()}); setInterval(async()=>{ if(currentUser) await presenceRef.update({online:true,lastSeen:Date.now()}); },30000); }
    function resetInactivityTimer(){ if(inactivityTimer) clearTimeout(inactivityTimer); inactivityTimer=setTimeout(()=>{ if(mainContainer.style.display==='block'){ showToast("Sesión expirada (40 min)",true); logoutWithAnimation(); } },SESSION_TIMEOUT); }
    async function logoutWithAnimation(){ mainContainer.classList.add('tv-off-effect'); setTimeout(async()=>{ if(inactivityTimer) clearTimeout(inactivityTimer); if(presenceRef) await presenceRef.set({online:false,lastSeen:Date.now()}); if(currentUser) await db.ref(`push_tokens/${currentUser}`).remove(); currentUser=""; isAdmin=false; loginScreen.style.display='flex'; mainContainer.style.display='none'; mainContainer.classList.remove('tv-off-effect'); db.ref('tasks').off(); if(notificationsRef) notificationsRef.off(); document.removeEventListener('click',closePopupOnClickOutside); document.getElementById('login-username').value=''; document.getElementById('login-password').value=''; document.getElementById('admin-panel-container').style.display='none'; },250); }
    
    const loginScreen=document.getElementById('login-screen'), mainContainer=document.getElementById('main-container'), feedDiv=document.getElementById('feed-container');
    buildRoleSelector(); document.getElementById('do-login-btn').onclick=loginUser; document.getElementById('do-register-btn').onclick=registerUser; document.getElementById('login-username').value=loadUserName();
    
    // Fondo partículas
    const bgCanvas=document.getElementById('bg-canvas'), bgCtx=bgCanvas.getContext('2d'); let particles=[], mouseX=-200,mouseY=-200;
    function initParticles(){ bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight; particles=[]; for(let i=0;i<50;i++) particles.push({x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,radius:Math.random()*2+1,alpha:Math.random()*0.4+0.2}); }
    function drawBackground(){ if(!bgCtx) return; bgCtx.fillStyle='rgba(0,0,0,0.08)'; bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height); for(let i=0;i<particles.length;i++){ const p=particles[i]; p.x+=p.vx; if(p.x<0) p.x=bgCanvas.width; if(p.x>bgCanvas.width) p.x=0; p.y+=p.vy; if(p.y<0) p.y=bgCanvas.height; if(p.y>bgCanvas.height) p.y=0; bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.radius,0,Math.PI*2); bgCtx.fillStyle=`rgba(224,112,0,${p.alpha+Math.sin(Date.now()*0.002+p.x)*0.1})`; bgCtx.fill(); for(let j=i+1;j<particles.length;j++){ const p2=particles[j]; const d=Math.hypot(p.x-p2.x,p.y-p2.y); if(d<100){ bgCtx.beginPath(); bgCtx.moveTo(p.x,p.y); bgCtx.lineTo(p2.x,p2.y); bgCtx.strokeStyle=`rgba(224,112,0,0.06-d/1400)`; bgCtx.lineWidth=0.6; bgCtx.stroke(); } } const dm=Math.hypot(p.x-mouseX,p.y-mouseY); if(dm<120){ bgCtx.beginPath(); bgCtx.moveTo(p.x,p.y); bgCtx.lineTo(mouseX,mouseY); bgCtx.strokeStyle=`rgba(224,112,0,0.15)`; bgCtx.lineWidth=0.8; bgCtx.stroke(); } } requestAnimationFrame(drawBackground); }
    window.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;}); window.addEventListener('touchmove',e=>{if(e.touches[0]){mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;}}); window.addEventListener('resize',()=>{initParticles();}); initParticles(); drawBackground();
</script>
</body>
